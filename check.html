<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบรายชื่อ CVC Camp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg w-full max-w-2xl border-t-8 border-indigo-600 mb-6">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">🔍 ตรวจสอบรายชื่อผู้สมัคร</h2>
        <p class="text-center text-sm text-gray-500 mb-6">เลือกภาคและคริสตจักร เพื่อดูสถานะการลงทะเบียนของสมาชิก</p>

        <form id="searchForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">ภาคพันธกิจ / สังกัดหลัก</label>
                <select id="region" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 bg-white" required>
                    <option value="">-- เลือกภาคพันธกิจ/สังกัด --</option>
                </select>
            </div>
            
            <div id="churchDiv" class="hidden">
                <label class="block text-sm font-semibold text-gray-700">คริสตจักร / หน่วย (แขวง)</label>
                <select id="church" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 bg-white"></select>
            </div>

            <button type="submit" id="btnSearch" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-lg hover:bg-indigo-700 transition mt-6 disabled:bg-gray-400 shadow-md">
                ค้นหารายชื่อ
            </button>
        </form>
    </div>

    <div id="resultContainer" class="w-full max-w-2xl hidden">
        <div class="flex justify-between items-end mb-4 px-2">
            <h3 class="text-lg font-bold text-gray-800">ผลการค้นหา</h3>
            <span id="totalCount" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full">พบ 0 รายการ</span>
        </div>
        
        <div id="resultList" class="space-y-4"></div>
    </div>

    <script>
        // ⚠️ อย่าลืมแก้ URL ให้เป็นอันเดียวกับหน้า index.html นะครับ!
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzt3qj7QYYuKRG2b_o5jw9p06hSylXVQOCK9ef-UJ7C2B-n_289fS0ErYvI7uhDROJbcQ/exec"; 

        const churchData = {
            "CVC พิษณุโลก": ["BeOne", "BeTwo", "RU", "CL", "NU 1", "NU 2", "NU 3", "NewSeason A", "NewSeason B", "NGP A", "NGP B", "NGP C", "V-Gen A1", "V-Gen A2", "V-Gen B1", "V-Gen B2", "V-Gen B3", "Acts A", "Acts B", "Acts C", "Acts D", "เยรูซาเลม1", "เยรูซาเลม2", "Power Eagle 1", "Power Eagle 2", "Power Eagle 3", "Happiness 1", "Happiness 2", "Unity 1  ", "Unity 2"],
            "ภาคพันธกิจที่ 1 (อ.อำนวย เจริญเรือง)": ["CVC ลำพูน", "CVC บ้านโฮ่ง", "CVC บ้านธิ", "CVC เวียงหนองล่อง", "CVC ป่าซาง", "CVC ทิพเนตร", "CVC แม่ฮ่องสอน", "CVC แม่สะเรียง", "CVC ขุนยวม", "CVC สบเมย", "CVC นครเชียงใหม่", "CVC นครลำปาง", "CVC วังเหนือ", "CVC แม่ทา", "CVC เมืองปาน", "CVC ลี้", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 2 (อ.มีชัย ว่องวรวิทย์)": ["CVC เชียงราย", "CVC แม่สรวย", "CVC ห้วยนากาด", "CVC เวียงป่าเป้า", "CVC เชียงคำ", "CVC พะเยา", "CVC พะเยา 2", "CVC น่าน", "CVC แม่สาย", "CVC แพร่", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 3 (อ.ยศไกร เกล็ดจีน)": ["CVC บางระกำ", "CVC พรหมพิราม", "CVC บางกระทุ่ม", "CVC วังทอง", "CVC นครไทย", "CVC บ้านแยง", "CVC ชาตระการ", "CVC วัดโบสถ์", "CVC ชุมชุนชาวแพ", "CVC โตกำแพง", "CVC เขาไร่", "CVC เนินมะปราง", "CVC ทรัพย์ไพรวัลย์", "CVC เขาค้อ (ไฮแลนด์)", "CVC อุตรดิตถ์", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 4 (อ.วันชัย คำฟู)": ["CVC นครแม่สอด", "CVC ห้วยกะโหลก", "CVC นครสวรรค์", "CVC ลาดยาว", "CVC อุทัยธานี", "CVC น้ำรอบ", "CVC ลานสัก", "CVC ชัยนาท", "CVC สุพรรณบุรี", "CVC พบพระ", "CVC อุ้มผาง", "CVC หนองบัว", "CVC วังน้ำขาว", "CVC บ้านหมี่", "CVC บางพล้อ", "CVC บรรพต", "CVC โกรกพระ", "CVC ตาคลี", "CVC ตากฟ้า", "CVC ชุมตาบง", "CVC แม่วงก์", "CVC แม่เปิน", "CVC อยุธยา", "CVC แม่ละมาด", "CVC  อ.เมือง ตาก", "CVC ท่าสองยาง", "CVC สว่างอารมภ์", "CVC เมืองอุทัยธานี", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 5 Zone A (อ.ปรเมศวร์ รัตนเวฬุ)": ["CVC  กำแพงเพชร", "CVC ขาณุวรลักษณ์", "CVC ไทรพัฒนา", "CVC เพชรบูรณ์", "CVC บ้านน้ำร้อน", "CVC สุโขทัย", "CVC กงไกรลาศ", "CVC พิจิตร", "CVC สามง่าม", "CVC  บึงนารา", "CVC คลองขลุง", "CVC สากเหล็ก", "CVC เขาทราย", "CVC เข็กน้อย", "CVC วิเชียรบุรี", "CVC บ้านแม่ท่าแพ", "CVC บ้านห้วยหยวก", "CVC ห้วยมะนาว", "CVC สวรรคโลก", "CVC ไผ่ท่าโพธิ์", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 5 Zone B (อ.บวรทรนง จิรทรัพย์เจริญ)": ["CVC ห้วยแย้", "CVC โคราช", "CVC กลางหมื่น", "CVC ขอนแก่น", "CVC อุดรธานี", "CVC หนองคาย", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 5 Zone C (อ.อัจจณา ปราณี)": ["CVC  กรุงเทพมหานคร", "CVC สมุทปราการ", "CVC  กบินทร์บุรี (จ.ปราจีนบุรี)", "CVC  ชลบุรี", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 5 Zone D (อ.กาญจนา นาทศิโรรัตน์)": ["CVC  เกาะสมุย (จ.สุราษฏร์ธานี)", "CVC  มาบอำมฤต (จ.ชุมพร)", "CVC  โป๊ะหมอ (หาดใหญ่)", "CVC  ปราณบุรี (ประจวบคีรีขันธ์)", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 5 Zone E (อ.พัณณิตา บุญย่านยาว)": ["CVC  สเปน (บาเซโลน่า)", "CVC นอร์เวย์ ( ออสโล )", "CVC เบียล ( สวิตเซอร์แลนด์ )", "CVC  บาเซิล ( สวิตเซอร์แลนด์ )", "CVC  ธูน ( สวิตเซอร์แลนด์ )", "CVC นครหลวงเวียงจันทร์", "CVC หลัก 32 ( อุดมไซ ลาว )", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"]
        };

        // ระบบ Dropdown
        document.addEventListener("DOMContentLoaded", function() {
            const regionSelect = document.getElementById("region");
            for (const region in churchData) {
                let opt = document.createElement("option");
                opt.value = region; opt.textContent = region;
                regionSelect.appendChild(opt);
            }
        });

        document.getElementById("region").addEventListener("change", function() {
            const region = this.value;
            const churchDiv = document.getElementById("churchDiv");
            const churchSelect = document.getElementById("church");
            churchSelect.innerHTML = '<option value="">-- เลือกคริสตจักร/หน่วย --</option>';

            if (region && churchData[region]) {
                churchDiv.classList.remove("hidden");
                churchSelect.required = true;
                churchData[region].forEach(church => {
                    let opt = document.createElement("option");
                    opt.value = church; opt.textContent = church;
                    churchSelect.appendChild(opt);
                });
            } else {
                churchDiv.classList.add("hidden");
                churchSelect.required = false;
            }
        });

        // ค้นหาข้อมูลเมื่อกดปุ่ม
        document.getElementById("searchForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById("btnSearch");
            const resultContainer = document.getElementById("resultContainer");
            const resultList = document.getElementById("resultList");
            const totalCount = document.getElementById("totalCount");

            btn.disabled = true;
            btn.innerText = "⏳ กำลังค้นหาข้อมูล...";
            resultContainer.classList.add("hidden");
            resultList.innerHTML = "";

            const selectedRegion = document.getElementById("region").value;
            let selectedChurch = document.getElementById("church").value;
            
            // ปรับข้อมูลให้ตรงกับตารางตอนบันทึก
            if (selectedRegion === "คริสตจักรแห่งนิมิตพิษณุโลก") {
                selectedChurch = document.getElementById("church").value;
            }

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "checkNames",
                        region: selectedRegion,
                        church: selectedChurch
                    })
                });
                
                const res = await response.json();

                if (res.result === "success") {
                    const data = res.data;
                    totalCount.innerText = "พบ " + data.length + " รายการ";
                    
                    if (data.length === 0) {
                        resultList.innerHTML = `<div class="bg-white p-6 rounded-xl text-center shadow text-gray-500">ไม่พบรายชื่อผู้สมัครจากคริสตจักรนี้</div>`;
                    } else {
                        data.forEach(item => {
                            // จัดการสีของสถานะ
                            let statusColor = "bg-orange-100 text-orange-700 border-orange-200";
                            if (item.status === "รอตรวจสอบ") statusColor = "bg-blue-100 text-blue-700 border-blue-200";
                            if (item.status === "ยืนยันแล้ว") statusColor = "bg-green-100 text-green-700 border-green-200";

                            const card = `
                                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                                    <div class="flex justify-between items-start mb-3">
                                        <div>
                                            <h4 class="font-bold text-gray-800 text-lg">ผู้กรอก: ${item.submitter}</h4>
                                            <p class="text-sm text-gray-500">ยอดผู้สมัครรวม: <span class="font-bold text-gray-700">${item.members} คน</span></p>
                                        </div>
                                        <span class="text-xs font-bold px-3 py-1.5 rounded-lg border ${statusColor}">${item.status}</span>
                                    </div>
                                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-100 text-sm text-gray-600 whitespace-pre-wrap">${item.names}</div>
                                </div>
                            `;
                            resultList.innerHTML += card;
                        });
                    }
                    resultContainer.classList.remove("hidden");
                }
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการดึงข้อมูล โปรดลองใหม่อีกครั้ง");
            }

            btn.disabled = false;
            btn.innerText = "ค้นหารายชื่อ";
        });
    </script>
</body>
</html>
