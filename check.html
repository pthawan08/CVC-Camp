<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบรายชื่อ CVC Camp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }

    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg w-full max-w-2xl border-t-8 border-indigo-600 mb-6">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">🔍 ตรวจสอบรายชื่อผู้สมัคร</h2>
        <p class="text-center text-sm text-gray-500 mb-6">เลือกภาคและคริสตจักร เพื่อดูสถานะการลงทะเบียนของสมาชิก</p>

        <form id="searchForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">ภาคพันธกิจ / สังกัดหลัก</label>
                <select id="region" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 bg-white" required>
                    <option value="">-- เลือกภาคพันธกิจ/สังกัด --</option>
                </select>
            </div>
            
            <div id="churchDiv" class="hidden">
                <label class="block text-sm font-semibold text-gray-700">คริสตจักร / หน่วย (แขวง)</label>
                <select id="church" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 bg-white"></select>
            </div>

            <button type="submit" id="btnSearch" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-lg hover:bg-indigo-700 transition mt-6 disabled:bg-gray-400 shadow-md">
                ค้นหารายชื่อ
            </button>
        </form>
    </div>

    <div id="resultContainer" class="w-full max-w-2xl hidden">
        <div class="flex justify-between items-end mb-4 px-2">

            <span id="totalCount" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full">พบ 0 รายการ</span>
        </div>
        
        <div id="resultList" class="space-y-4"></div>
    </div>

        };

        // ระบบ Dropdown
        document.addEventListener("DOMContentLoaded", function() {
            const regionSelect = document.getElementById("region");
            for (const region in churchData) {
                let opt = document.createElement("option");
                opt.value = region; opt.textContent = region;
                regionSelect.appendChild(opt);
            }
        });

        document.getElementById("region").addEventListener("change", function() {
            const region = this.value;
            const churchDiv = document.getElementById("churchDiv");
            const churchSelect = document.getElementById("church");
            churchSelect.innerHTML = '<option value="">-- เลือกคริสตจักร/หน่วย --</option>';

            if (region && churchData[region]) {
                churchDiv.classList.remove("hidden");
                churchSelect.required = true;
                churchData[region].forEach(church => {
                    let opt = document.createElement("option");
                    opt.value = church; opt.textContent = church;
                    churchSelect.appendChild(opt);
                });
            } else {
                churchDiv.classList.add("hidden");
                churchSelect.required = false;
            }
        });

        // ค้นหาข้อมูลเมื่อกดปุ่ม
        document.getElementById("searchForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById("btnSearch");
            const resultContainer = document.getElementById("resultContainer");
            const resultList = document.getElementById("resultList");
            const totalCount = document.getElementById("totalCount");

            btn.disabled = true;
            btn.innerText = "⏳ กำลังค้นหาข้อมูล...";
            resultContainer.classList.add("hidden");
            resultList.innerHTML = "";

            const selectedRegion = document.getElementById("region").value;
            let selectedChurch = document.getElementById("church").value;
            
            // ปรับข้อมูลให้ตรงกับตารางตอนบันทึก
            if (selectedRegion === "คริสตจักรแห่งนิมิตพิษณุโลก") {
                selectedChurch = document.getElementById("church").value;
            }

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "checkNames",
                        region: selectedRegion,
                        church: selectedChurch
                    })
                });
                
                const res = await response.json();

                if (res.result === "success") {
                    const data = res.data;
                    totalCount.innerText = "พบ " + data.length + " รายการ";
                    
                    if (data.length === 0) {
                        resultList.innerHTML = `<div class="bg-white p-6 rounded-xl text-center shadow text-gray-500">ไม่พบรายชื่อผู้สมัครจากคริสตจักรนี้</div>`;
                    } else {
                        data.forEach(item => {
                            // จัดการสีของสถานะ
                            let statusColor = "bg-orange-100 text-orange-700 border-orange-200";
                            if (item.status === "รอตรวจสอบ") statusColor = "bg-blue-100 text-blue-700 border-blue-200";
                            if (item.status === "ยืนยันแล้ว") statusColor = "bg-green-100 text-green-700 border-green-200";

                            const card = `
                                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                                    <div class="flex justify-between items-start mb-3">
                                        <div>
                                            <h4 class="font-bold text-gray-800 text-lg">ผู้กรอก: ${item.submitter}</h4>
                                            <p class="text-sm text-gray-500">ยอดผู้สมัครรวม: <span class="font-bold text-gray-700">${item.members} คน</span></p>
                                        </div>
                                        <span class="text-xs font-bold px-3 py-1.5 rounded-lg border ${statusColor}">${item.status}</span>
                                    </div>
                                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-100 text-sm text-gray-600 whitespace-pre-wrap">${item.names}</div>
                                </div>
                            `;
                            resultList.innerHTML += card;
                        });
                    }
                    resultContainer.classList.remove("hidden");
                }
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการดึงข้อมูล โปรดลองใหม่อีกครั้ง");
            }

            btn.disabled = false;
            btn.innerText = "ค้นหารายชื่อ";
        });
    </script>
</body>
</html>
