<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินค่าย CVC Prayer #12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + div {
            background-color: #2563EB;
            color: white;
            border-color: #2563EB;
            font-weight: bold;
        }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <div class="bg-blue-600 shadow-md text-white px-4 py-8 rounded-b-3xl relative overflow-hidden">
        <div class="absolute -right-10 -top-10 w-32 h-32 bg-white opacity-10 rounded-full"></div>
        <div class="absolute -left-10 -bottom-10 w-24 h-24 bg-white opacity-10 rounded-full"></div>
        <h1 class="text-xl font-bold text-center relative z-10 leading-relaxed">แบบประเมินความพึงพอใจ<br>ค่ายคริสตจักรแห่งนิมิต (CVC) "Prayer"</h1>
        <p class="text-blue-100 text-sm text-center mt-2 relative z-10">วันที่ 30 ก.ค - 2 ส.ค 26</p>
        <p class="text-blue-200 text-xs text-center mt-1 relative z-10">ณ หอประชุม ศรีวชิรโชติ ม.ราชภัฏพิบูลสงคราม จ.พิษณุโลก</p>
    </div>

    <form id="evaluationForm" class="max-w-md mx-auto mt-6 px-4 space-y-6">
        
        <!-- ข้อมูลทั่วไป -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="font-bold text-gray-800 border-b pb-2 mb-4 flex items-center">
                <span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">1</span> ข้อมูลทั่วไป
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">ท่านเป็นสมาชิกคริสตจักรแห่งนิมิต <span class="text-red-500">*</span></label>
                    <!-- เปลี่ยนเป็น input แบบมี list อ้างอิง -->
                    <input type="text" id="churchName" list="churchListOptions" required placeholder="พิมพ์เพื่อค้นหาชื่อคริสตจักร..." class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300 bg-blue-50/50">
                    <!-- DataList สำหรับทำ Autocomplete -->
                    <datalist id="churchListOptions"></datalist>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">จังหวัด <span class="text-red-500">*</span></label>
                    <input type="text" id="province" required placeholder="ระบุจังหวัด..." class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300">
                </div>
            </div>
        </div>

        <div class="text-center px-4">
            <p class="text-sm text-gray-500 bg-blue-50 py-2 px-4 rounded-full inline-block">📝 โปรดเลือกระดับความพึงพอใจของท่าน</p>
        </div>

        <!-- คอนเทนเนอร์สำหรับใส่การ์ดคำถาม -->
        <div id="questionsContainer" class="space-y-6"></div>

        <!-- พระพรและข้อเสนอแนะ -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
            <h2 class="font-bold text-gray-800 border-b pb-2 mb-2 flex items-center">
                <span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">💬</span> ความคิดเห็นเพิ่มเติม
            </h2>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">พระพรที่ได้รับจากค่าย</label>
                <textarea id="blessing" rows="3" placeholder="แบ่งปันพระพรที่ท่านได้รับ..." class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-300"></textarea>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">ข้อเสนอแนะอื่นๆ</label>
                <textarea id="suggestion" rows="3" placeholder="ข้อเสนอแนะเพื่อการพัฒนา..." class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-300"></textarea>
            </div>
        </div>

        <!-- ปุ่มส่งแบบประเมิน -->
        <button type="button" onclick="submitEvaluation()" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-lg py-4 rounded-full shadow-lg hover:opacity-90 transition mt-4 mb-8">
            ส่งแบบประเมิน
        </button>

    </form>

    <script>
        // 🗂️ ฐานข้อมูลคริสตจักร (ดึงมาจากระบบ Workshop)
        const churchData = {
            "CVC พิษณุโลก": ["BeOne", "BeTwo", "RU", "CL", "NU 1", "NU 2", "NU 3", "NewSeason A", "NewSeason B", "NGP A", "NGP B", "NGP C", "V-Gen A1", "V-Gen A2", "V-Gen B1", "V-Gen B2", "V-Gen B3", "Acts A", "Acts B", "Acts C", "Acts D", "เยรูซาเลม1", "เยรูซาเลม2", "Power Eagle 1", "Power Eagle 2", "Power Eagle 3", "Happiness 1", "Happiness 2", "Unity 1", "Unity 2"],
            "ภาคพันธกิจที่ 1": ["CVC ลำพูน", "CVC บ้านโฮ่ง", "CVC บ้านธิ", "CVC เวียงหนองล่อง", "CVC ป่าซาง", "CVC ทิพเนตร", "CVC แม่ฮ่องสอน", "CVC แม่สะเรียง", "CVC ขุนยวม", "CVC สบเมย", "CVC นครเชียงใหม่", "CVC นครลำปาง", "CVC วังเหนือ", "CVC แม่ทา", "CVC เมืองปาน", "CVC ลี้"],
            "ภาคพันธกิจที่ 2": ["CVC เชียงราย", "CVC แม่สรวย", "CVC ห้วยนากาด", "CVC เวียงป่าเป้า", "CVC เชียงคำ", "CVC พะเยา", "CVC พะเยา 2", "CVC น่าน", "CVC แม่สาย", "CVC แพร่"],
            "ภาคพันธกิจที่ 3": ["CVC บางระกำ", "CVC พรหมพิราม", "CVC บางกระทุ่ม", "CVC วังทอง", "CVC นครไทย", "CVC บ้านแยง", "CVC ชาตระการ", "CVC วัดโบสถ์", "CVC ชุมชุนชาวแพ", "CVC โตกำแพง", "CVC เขาไร่", "CVC เนินมะปราง", "CVC ทรัพย์ไพรวัลย์", "CVC เขาค้อ (ไฮแลนด์)", "CVC อุตรดิตถ์"],
            "ภาคพันธกิจที่ 4": ["CVC นครแม่สอด", "CVC ห้วยกะโหลก", "CVC นครสวรรค์", "CVC ลาดยาว", "CVC อุทัยธานี", "CVC น้ำรอบ", "CVC ลานสัก", "CVC ชัยนาท", "CVC สุพรรณบุรี", "CVC พบพระ", "CVC อุ้มผาง", "CVC หนองบัว", "CVC วังน้ำขาว", "CVC บ้านหมี่", "CVC บางพล้อ", "CVC บรรพต", "CVC โกรกพระ", "CVC ตาคลี", "CVC ตากฟ้า", "CVC ชุมตาบง", "CVC แม่วงก์", "CVC แม่เปิน", "CVC อยุธยา", "CVC แม่ละมาด", "CVC อ.เมือง ตาก", "CVC ท่าสองยาง", "CVC สว่างอารมภ์", "CVC เมืองอุทัยธานี"],
            "ภาคพันธกิจที่ 5": ["CVC กำแพงเพชร", "CVC ขาณุวรลักษณ์", "CVC ไทรพัฒนา", "CVC เพชรบูรณ์", "CVC บ้านน้ำร้อน", "CVC สุโขทัย", "CVC กงไกรลาศ", "CVC พิจิตร", "CVC สามง่าม", "CVC บึงนารา", "CVC คลองขลุง", "CVC สากเหล็ก", "CVC เขาทราย", "CVC เข็กน้อย", "CVC วิเชียรบุรี", "CVC บ้านแม่ท่าแพ", "CVC บ้านห้วยหยวก", "CVC ห้วยมะนาว", "CVC สวรรคโลก", "CVC ไผ่ท่าโพธิ์", "CVC ห้วยแย้", "CVC โคราช", "CVC กลางหมื่น", "CVC ขอนแก่น", "CVC อุดรธานี", "CVC หนองคาย", "CVC กรุงเทพมหานคร", "CVC สมุทปราการ", "CVC กบินทร์บุรี (จ.ปราจีนบุรี)", "CVC ชลบุรี", "CVC เกาะสมุย (จ.สุราษฏร์ธานี)", "CVC มาบอำมฤต (จ.ชุมพร)", "CVC โป๊ะหมอ (หาดใหญ่)", "CVC ปราณบุรี (ประจวบคีรีขันธ์)", "CVC สเปน (บาเซโลน่า)", "CVC นอร์เวย์ ( ออสโล )", "CVC เบียล ( สวิตเซอร์แลนด์ )", "CVC บาเซิล ( สวิตเซอร์แลนด์ )", "CVC ธูน ( สวิตเซอร์แลนด์ )", "CVC นครหลวงเวียงจันทร์", "CVC หลัก 32 ( อุดมไซ ลาว )"]
        };

        // ฟังก์ชันยัดรายชื่อใส่ Autocomplete
        function populateChurchDatalist() {
            const datalist = document.getElementById('churchListOptions');
            let allChurches = [];
            
            // ดึงชื่อออกมาทั้งหมดมารวมกัน
            for (let region in churchData) {
                allChurches = allChurches.concat(churchData[region]);
            }
            
            // สร้างเป็นตัวเลือก <option>
            allChurches.forEach(church => {
                let option = document.createElement('option');
                option.value = church;
                datalist.appendChild(option);
            });
        }

        const surveyData = [
            {
                category: "ด้านสถานที่จัดค่าย / ระยะเวลา / อาหาร",
                questions: [
                    { id: "q1_1", text: "1. สถานที่สะอาดและมีความเหมาะสม" },
                    { id: "q1_2", text: "2. ความพร้อมของอุปกรณ์โสตทัศนูปกรณ์" },
                    { id: "q1_3", text: "3. ระยะเวลาในการจัดค่ายมีความเหมาะสม" }
                ]
            },
            {
                category: "ด้านคำสอน / การนมัสการ",
                questions: [
                    { id: "q2_1", text: "1. เนื้อหาชัดเจน ตรงประเด็น และเข้าใจง่าย" },
                    { id: "q2_2", text: "2. สามารถนำมาประยุกต์ใช้ได้ในชีวิตประจำวัน" },
                    { id: "q2_3", text: "3. คู่มือค่าย มีความเหมาะสม" },
                    { id: "q2_4", text: "4. การนมัสการ" }
                ]
            },
            {
                category: "อื่นๆ",
                questions: [
                    { id: "q3_1", text: "1. พิธีเปิด ปิดค่าย" },
                    { id: "q3_2", text: "2. วีดิทัศน์/คำพยาน/CVC NEWS" },
                    { id: "q3_3", text: "3. กิจกรรมตอบสนอง" },
                    { id: "q3_4", text: "4. ผังที่นั่งมีประโยชน์ต่อท่านไหม" },
                    { id: "q3_5", text: "5. CVC Prayer Night" },
                    { id: "q3_6", text: "6. CVC Sport Game" },
                    { id: "q3_7", text: "7. Workshop" }
                ]
            }
        ];

        const ratingOptions = [
            { value: "ดีมาก", label: "ดีมาก" },
            { value: "ดี", label: "ดี" },
            { value: "พอใช้", label: "พอใช้" },
            { value: "ปรับปรุง", label: "ปรับปรุง" },
            { value: "ไม่ได้เข้าร่วม", label: "ไม่ได้เข้าร่วม" }
        ];

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';

            surveyData.forEach((section) => {
                html += `<div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">`;
                html += `<h2 class="font-bold text-blue-800 border-b pb-2 mb-4">${section.category}</h2>`;
                html += `<div class="space-y-6">`;

                section.questions.forEach((q) => {
                    html += `<div class="question-group">`;
                    html += `<p class="font-semibold text-gray-700 text-sm mb-3">${q.text}</p>`;
                    html += `<div class="grid grid-cols-5 gap-1.5">`; 

                    ratingOptions.forEach(opt => {
                        html += `
                            <label class="block cursor-pointer">
                                <input type="radio" name="${q.id}" value="${opt.value}" required>
                                <div class="text-center py-2 px-1 text-[11px] sm:text-xs rounded-lg border border-gray-200 bg-gray-50 text-gray-600 hover:bg-gray-100 transition h-full flex items-center justify-center break-words leading-tight">
                                    ${opt.label}
                                </div>
                            </label>
                        `;
                    });

                    html += `</div></div>`;
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;
        }

        function submitEvaluation() {
            const form = document.getElementById('evaluationForm');
            
            if (!form.checkValidity()) {
                alert('⚠️ กรุณากรอกข้อมูลและเลือกคะแนนประเมินให้ครบทุกข้อครับ');
                form.reportValidity();
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '⏳ กำลังบันทึกข้อมูล...';
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            let formData = {
                church: document.getElementById('churchName').value,
                province: document.getElementById('province').value,
                blessing: document.getElementById('blessing').value,
                suggestion: document.getElementById('suggestion').value,
                ratings: {}
            };

            surveyData.forEach(section => {
                section.questions.forEach(q => {
                    const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                    formData.ratings[q.id] = selected ? selected.value : "";
                });
            });

            console.log("ข้อมูลที่เตรียมส่ง:", formData);
            
            setTimeout(() => {
                alert('✅ ขอบคุณสำหรับการประเมินครับ! ระบบได้บันทึกข้อมูลเรียบร้อยแล้ว');
                window.location.reload();
            }, 1000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateChurchDatalist();
            renderQuestions();
        });
    </script>
</body>
</html>
