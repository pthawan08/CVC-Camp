<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางค่าย CVC Prayer #12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; }
        .tab-active { background-color: #2563EB; color: white; border-color: #2563EB; }
        .tab-inactive { background-color: white; color: #4B5563; border-color: #E5E7EB; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* อนิเมชันตอนเปิดรูปผังที่นั่ง */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .modal-animate { animation: popIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <div class="bg-blue-600 shadow-md text-white px-4 py-6 rounded-b-3xl relative overflow-hidden">
        <div class="absolute -right-10 -top-10 w-32 h-32 bg-white opacity-10 rounded-full"></div>
        <div class="absolute -left-10 -bottom-10 w-24 h-24 bg-white opacity-10 rounded-full"></div>
        <h1 class="text-2xl font-bold text-center relative z-10">ตารางค่าย CVC Prayer #12</h1>
        <p class="text-blue-100 text-sm text-center mt-1 relative z-10">วันที่ 30 ก.ค. - 2 ส.ค. 2026</p>
        <p class="text-blue-200 text-xs text-center mt-1 relative z-10">ณ ม.ราชภัฏพิบูลสงคราม จ.พิษณุโลก</p>
    </div>

    <!-- Tabs วันที่ -->
    <div class="max-w-md mx-auto mt-4 px-4 sticky top-4 z-40">
        <div class="flex space-x-2 overflow-x-auto no-scrollbar py-2 bg-[#f4f7f6]">
            <button id="btn-day1" onclick="switchTab('day1')" class="tab-active flex-shrink-0 px-4 py-2 rounded-full font-bold text-sm shadow-sm transition-all border border-transparent whitespace-nowrap">พฤ. 30 ก.ค.</button>
            <button id="btn-day2" onclick="switchTab('day2')" class="tab-inactive flex-shrink-0 px-4 py-2 rounded-full font-bold text-sm shadow-sm transition-all border whitespace-nowrap">ศ. 31 ก.ค.</button>
            <button id="btn-day3" onclick="switchTab('day3')" class="tab-inactive flex-shrink-0 px-4 py-2 rounded-full font-bold text-sm shadow-sm transition-all border whitespace-nowrap">ส. 1 ส.ค.</button>
            <button id="btn-day4" onclick="switchTab('day4')" class="tab-inactive flex-shrink-0 px-4 py-2 rounded-full font-bold text-sm shadow-sm transition-all border whitespace-nowrap">อา. 2 ส.ค.</button>
        </div>
    </div>

    <!-- ปุ่มดูผังที่นั่ง -->
    <div class="max-w-md mx-auto mt-3 px-4">
        <button onclick="openSeatingModal()" class="w-full bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-bold py-3 rounded-2xl shadow-md flex items-center justify-center space-x-2 hover:opacity-90 transition">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
            <span>ดูผังที่นั่งห้องประชุม (Seating Chart)</span>
        </button>
    </div>

    <!-- Content รายการกำหนดการ -->
    <div class="max-w-md mx-auto mt-4 px-4 pb-10" id="schedule-container">
        <!-- ข้อมูลตารางจะถูกโหลดมาใส่ตรงนี้ด้วย Javascript -->
    </div>

    <!-- ============================================== -->
    <!-- ป๊อปอัป (Modal) สำหรับแสดงรูปผังที่นั่ง -->
    <!-- ============================================== -->
    <div id="seatingModal" class="fixed inset-0 bg-black/80 z-50 hidden flex flex-col items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl modal-animate relative">
            
            <!-- ปุ่มปิดมุมขวาบน -->
            <button onclick="closeSeatingModal()" class="absolute top-4 right-4 bg-white/90 p-2 rounded-full shadow-sm text-gray-600 hover:text-red-500 hover:bg-red-50 transition z-10">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            
            <div class="p-5 border-b border-gray-100 bg-blue-50">
                <h3 class="text-lg font-bold text-blue-800 text-center">🗺️ ผังที่นั่งห้องประชุม</h3>
                <p class="text-xs text-center text-blue-600 mt-1">ค่าย CVC Prayer #12</p>
            </div>

            <!-- ส่วนใส่รูปภาพผังที่นั่ง -->
            <div class="p-4 flex justify-center bg-gray-50 min-h-[300px] items-center">
                <!-- ⚠️ เปลี่ยนลิงก์รูปภาพผังที่นั่งตรงนี้นะครับ ⚠️ -->
                <img src="https://via.placeholder.com/600x400.png?text=กำลังจัดทำผังที่นั่ง+รออัปเดตเร็วๆ+นี้" alt="ผังที่นั่ง" class="w-full h-auto rounded-xl shadow-sm border border-gray-200">
            </div>
            
            <div class="p-4 bg-white">
                <button onclick="closeSeatingModal()" class="w-full bg-gray-100 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-200 transition">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>
    <!-- ============================================== -->

    <script>
        const scheduleData = {
            "day1": [
                { time: "15:00 - 18:00", title: "ลงทะเบียน / รับเสื้อ", type: "general" },
                { time: "17:00 - 18:00", title: "พักผ่อนตามอัธยาศัย / รับประทานอาหารเย็น", type: "food" },
                { time: "18:00 - 18:15", title: "VTR Title ค่าย", type: "media" },
                { time: "18:15 - 18:30", title: "กล่าวต้อนรับ", type: "ceremony" },
                { time: "18:30 - 19:00", title: "พิธีเปิด", type: "ceremony" },
                { time: "19:00 - 21:15", title: "CVC Prayer Night", type: "worship" },
                { time: "21:15 - 21:25", title: "ประกาศข่าว / อธิษฐานปิด", type: "general" },
                { time: "21:25 - 21:30", title: "ร้องเพลงสรรเสริญ", type: "worship" }
            ],
            "day2": [
                { time: "08:00 - 08:30", title: "Devotion ส่วนตัว", type: "worship" },
                { time: "08:30 - 09:10", title: "นมัสการ", type: "worship" },
                { time: "09:10 - 09:20", title: "เคลื่อนไหวใน HS", type: "worship" },
                { time: "09:20 - 09:25", title: "ถวายทรัพย์ 1", type: "ceremony" },
                { time: "09:25 - 09:30", title: "คำพยานชีวิต 1", type: "media" },
                { time: "09:30 - 10:40", title: "สอน 1", type: "teach" },
                { time: "10:40 - 10:50", title: "Share Small Group", type: "activity" },
                { time: "10:50 - 12:00", title: "สอน 2", type: "teach" },
                { time: "12:00 - 12:10", title: "ถวายพระพร ร.10", type: "ceremony" },
                { time: "12:10 - 12:15", title: "ประกาศข่าว", type: "general" },
                { time: "12:15 - 14:00", title: "รับประทานอาหาร", type: "food" },
                { time: "14:00 - 16:00", title: "CVC Sport Game (ณ ห้องประชุม)", type: "activity" },
                { time: "16:00 - 18:30", title: "อาหารเย็น / พักผ่อนตามอัธยาศัย", type: "food" },
                { time: "18:30 - 18:40", title: "VTR Title ค่าย", type: "media" },
                { time: "18:40 - 19:20", title: "นมัสการ", type: "worship" },
                { time: "19:20 - 19:30", title: "Moving in the Holy Spirit", type: "worship" },
                { time: "19:30 - 19:40", title: "ถวายทรัพย์ 2", type: "ceremony" },
                { time: "19:40 - 19:50", title: "มี VTR ก่อนการแสดงพิเศษ", type: "media" },
                { time: "19:50 - 19:55", title: "VTR เกี่ยวกับการ อธ, ความเชื่อ", type: "media" },
                { time: "19:55 - 20:40", title: "เทศนาฟื้นฟู 1", type: "teach" },
                { time: "20:40 - 21:10", title: "ตอบสนอง", type: "worship" },
                { time: "21:10 - 21:15", title: "ประกาศข่าว", type: "general" }
            ],
            "day3": [
                { time: "08:00 - 08:30", title: "Devotion ส่วนตัว", type: "worship" },
                { time: "08:30 - 09:10", title: "นมัสการ", type: "worship" },
                { time: "09:10 - 09:20", title: "เคลื่อนไหวใน HS", type: "worship" },
                { time: "09:20 - 09:25", title: "ถวายทรัพย์ 3", type: "ceremony" },
                { time: "09:25 - 09:30", title: "คำพยานชีวิต 2", type: "media" },
                { time: "09:30 - 09:50", title: "มอบสูจิบัตร", type: "ceremony" },
                { time: "09:50 - 11:00", title: "สอน 3", type: "teach" },
                { time: "11:00 - 12:10", title: "สอน 4", type: "teach" },
                { time: "12:10 - 12:20", title: "Share Small Group", type: "activity" },
                { time: "12:20 - 12:25", title: "ประกาศข่าว", type: "general" },
                { time: "12:25 - 13:30", title: "รับประทานอาหาร", type: "food" },
                { time: "13:30 - 16:00", title: "Workshop / กลุ่มย่อยค่าย", type: "activity" },
                { time: "16:00 - 18:30", title: "อาหารเย็น / พักผ่อนตามอัธยาศัย", type: "food" },
                { time: "18:30 - 18:40", title: "VTR Title ค่าย", type: "media" },
                { time: "18:40 - 19:20", title: "นมัสการ", type: "worship" },
                { time: "19:20 - 19:30", title: "Moving in the Holy Spirit", type: "worship" },
                { time: "19:30 - 19:40", title: "ถวายทรัพย์ 4 (พันธกิจโลก)", type: "ceremony" },
                { time: "19:40 - 19:50", title: "การแสดงวัฒนธรรม", type: "activity" },
                { time: "19:50 - 19:55", title: "VTR vision night", type: "media" },
                { time: "19:55 - 20:40", title: "เทศนาฟื้นฟู 2", type: "teach" },
                { time: "20:40 - 21:10", title: "ตอบสนอง", type: "worship" },
                { time: "21:10 - 21:15", title: "ประกาศข่าว", type: "general" }
            ],
            "day4": [
                { time: "08:30 - 09:10", title: "นมัสการ", type: "worship" },
                { time: "09:10 - 09:20", title: "เคลื่อนไหวใน HS", type: "worship" },
                { time: "09:20 - 09:30", title: "ถวายทรัพย์ 5", type: "ceremony" },
                { time: "09:30 - 10:40", title: "สอน 5", type: "teach" },
                { time: "10:40 - 11:50", title: "สอน 6", type: "teach" },
                { time: "11:50 - 12:00", title: "Share Small Group", type: "activity" },
                { time: "12:00 - 12:10", title: "ขอบคุณวิทยากร", type: "ceremony" },
                { time: "12:10 - 12:30", title: "พิธีปิด", type: "ceremony" },
                { time: "12:30 - 12:30", title: "เดินทางกลับด้วยความปลอดภัย", type: "general" }
            ]
        };

        function getTypeColor(type) {
            switch(type) {
                case 'food': return 'bg-orange-100 border-orange-200 text-orange-800';
                case 'worship': return 'bg-purple-100 border-purple-200 text-purple-800';
                case 'teach': return 'bg-green-100 border-green-200 text-green-800';
                case 'activity': return 'bg-pink-100 border-pink-200 text-pink-800';
                case 'ceremony': return 'bg-yellow-100 border-yellow-200 text-yellow-800';
                case 'media': return 'bg-gray-100 border-gray-200 text-gray-800';
                default: return 'bg-blue-50 border-blue-200 text-blue-800'; 
            }
        }

        function switchTab(dayKey) {
            ["day1", "day2", "day3", "day4"].forEach(d => {
                let btn = document.getElementById("btn-" + d);
                if (d === dayKey) {
                    btn.classList.remove("tab-inactive"); btn.classList.add("tab-active");
                } else {
                    btn.classList.remove("tab-active"); btn.classList.add("tab-inactive");
                }
            });

            const container = document.getElementById("schedule-container");
            container.innerHTML = ""; 

            const items = scheduleData[dayKey];
            
            items.forEach((item, index) => {
                const colorClass = getTypeColor(item.type);
                const cardHtml = `
                    <div class="flex mb-4 items-stretch opacity-0 animate-fade-in" style="animation-delay: ${index * 0.05}s; animation-fill-mode: forwards;">
                        <div class="w-1/4 pr-3 text-right flex flex-col justify-center">
                            <span class="text-sm font-bold text-gray-800 tracking-tight leading-tight">${item.time.replace(' - ', '<br><span class="text-xs text-gray-400 font-normal">ถึง</span><br>')}</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <div class="w-3 h-3 rounded-full bg-blue-300 border-2 border-white shadow-sm my-auto z-10"></div>
                            <div class="w-0.5 h-full bg-blue-100 -mt-2 absolute -z-10"></div>
                        </div>
                        <div class="w-3/4 pl-4 pb-2">
                            <div class="${colorClass} border rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow h-full flex items-center">
                                <h3 class="font-bold text-[15px] leading-tight">${item.title}</h3>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // ระบบเปิด-ปิด Modal
        function openSeatingModal() {
            document.getElementById('seatingModal').classList.remove('hidden');
        }

        function closeSeatingModal() {
            document.getElementById('seatingModal').classList.add('hidden');
        }

        window.onload = () => {
            switchTab('day1');
        };
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
    </style>
</body>
</html>
