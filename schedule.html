        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; }

</head>

        <div class="absolute top-0 left-0 w-full h-3 pastel-blue"></div>
        <h1 class="text-xl md:text-2xl font-bold text-gray-800 mb-2">โปรแกรมค่ายคริสตจักรแห่งนิมิต # 12 "Prayer"</h1>
        <p class="text-gray-500 font-semibold mb-1">📅 30 ก.ค. - 2 ส.ค. 2026</p>
        <p class="text-gray-500 text-sm mb-6">📍 ณ มหาวิทยาลัยราชภัฏพิบูลสงคราม จ.พิษณุโลก</p>
        
        <!-- 🪑 ปุ่มสำหรับดูผังที่นั่ง (เตรียมไว้สำหรับอนาคต) -->
        <!-- วิธีแก้เมื่อผังเสร็จ: เปลี่ยนค่า href="..." เป็นลิงก์รูปภาพผังที่นั่ง และเปลี่ยนข้อความด้านในปุ่ม -->
        <a href="#" id="seatingPlanBtn" class="inline-block w-full md:w-auto px-6 py-3 rounded-full font-bold text-sm transition-all duration-300 bg-gray-100 text-gray-400 cursor-not-allowed border border-gray-200">
            🪑 ผังที่นั่ง (รอประกาศหลังจัดโซนเสร็จ)
        </a>
    </div>

    <!-- เมนูเลือกวัน (จะถูกสร้างอัตโนมัติ) -->

        <!-- ปุ่มเลือกวันจะมาอยู่ตรงนี้ -->
    </div>

    <!-- พื้นที่แสดงผลกำหนดการ -->

        <!-- ข้อมูลรายการจะมาอยู่ตรงนี้ -->
    </div>

    <script>
        // 📝 ฐานข้อมูลกำหนดการทั้งหมด 4 วัน
        const scheduleData = [
            {
                id: "day1",
                date: "วันที่ 30 กรกฎาคม 2026",
                shortName: "30 ก.ค.",
                items: [
                    { time: "15:00 - 18:30", title: "ลงทะเบียน" },
                    { time: "17:30 - 18:30", title: "อาหารเย็น" },
                    { time: "18:30 - 18:45", title: "VTR Title งาน" },
                    { time: "18:45 - 19:00", title: "กล่าวต้อนรับ" },
                    { time: "19:00 - 19:30", title: "พิธีเปิด" },
                    { time: "19:30 - 20:00", title: "นมัสการ" },
                    { time: "20:00 - 20:15", title: "Moving in the Holy Spirit" },
                    { time: "20:15 - 21:00", title: "บรรยากาศ CVC Prayer Night" },
                    { time: "21:00 - 21:10", title: "ประกาศข่าว/อธิษฐานปิด" },
                    { time: "21:10 - 21:15", title: "ร้องเพลงสรรเสริญ" }
                ]
            },
            {
                id: "day2",
                date: "วันที่ 31 กรกฎาคม 2026",
                shortName: "31 ก.ค.",
                items: [
                    { time: "08:00 - 08:30", title: "Devotion ร่วมกัน" },
                    { time: "08:30 - 09:10", title: "นมัสการ" },
                    { time: "09:10 - 09:20", title: "เคลื่อนไหวใน HS" },
                    { time: "09:20 - 09:25", title: "ถวายทรัพย์ 1" },
                    { time: "09:25 - 09:30", title: "คำพยานชีวิต 1" },
                    { time: "09:30 - 10:40", title: "สอน 1" },
                    { time: "10:40 - 10:50", title: "Share Small Group" },
                    { time: "10:50 - 12:00", title: "สอน 2" },
                    { time: "12:00 - 12:10", title: "Share Small Group" },
                    { time: "12:10 - 12:15", title: "ประกาศข่าว" },
                    { time: "12:15 - 14:00", title: "รับประทานอาหาร" },
                    { time: "14:00 - 16:00", title: "CVC Sport Game ณ ห้องประชุม" },
                    { time: "16:00 - 18:30", title: "อาหารเย็น/ พักผ่อนตามอัธยาศัย" },
                    { time: "18:30 - 18:40", title: "VTR Title งาน" },
                    { time: "18:40 - 19:20", title: "นมัสการ" },
                    { time: "19:20 - 19:30", title: "Moving in the Holy Spirit" },
                    { time: "19:30 - 19:40", title: "ถวายทรัพย์ 2" },
                    { time: "19:40 - 19:50", title: "การแสดงวัฒนธรรม" },
                    { time: "19:50 - 19:55", title: "VTR vision night" },
                    { time: "19:55 - 20:40", title: "เทศนาฟื้นฟู 1" },
                    { time: "20:40 - 21:10", title: "ตอบสนอง" },
                    { time: "21:10 - 21:15", title: "ประกาศข่าว" }
                ]
            },
            {
                id: "day3",
                date: "วันที่ 1 สิงหาคม 2026",
                shortName: "1 ส.ค.",
                items: [
                    { time: "08:00 - 08:30", title: "Devotion ร่วมกัน" },
                    { time: "08:30 - 09:10", title: "นมัสการ" },
                    { time: "09:10 - 09:20", title: "เคลื่อนไหวใน HS" },
                    { time: "09:20 - 09:25", title: "ถวายทรัพย์ 3" },
                    { time: "09:25 - 09:30", title: "คำพยานชีวิต 2" },
                    { time: "09:30 - 09:50", title: "มอบวุฒิบัตร" },
                    { time: "09:50 - 11:00", title: "สอน 3" },
                    { time: "11:00 - 12:10", title: "สอน 4" },
                    { time: "12:10 - 12:20", title: "Share Small Group" },
                    { time: "12:20 - 12:25", title: "ประกาศข่าว" },
                    { time: "12:25 - 13:30", title: "รับประทานอาหาร" },
                    { time: "13:30 - 16:00", title: "workshop/ กลุ่มคนคล้าย STB" },
                    { time: "16:00 - 18:30", title: "อาหารเย็น /พักผ่อนตามอัธยาศัย" },
                    { time: "18:30 - 18:40", title: "VTR Title งาน" },
                    { time: "18:40 - 19:20", title: "นมัสการ" },
                    { time: "19:20 - 19:30", title: "Moving in the Holy Spirit" },
                    { time: "19:30 - 19:40", title: "ถวายทรัพย์ 4" },
                    { time: "19:40 - 19:50", title: "การแสดงวัฒนธรรม" },
                    { time: "19:50 - 19:55", title: "VTR เกี่ยวกับการ อธ, ความเชื่อ" },
                    { time: "19:55 - 20:40", title: "เทศนาฟื้นฟู 2" },
                    { time: "20:40 - 21:10", title: "ตอบสนอง" },
                    { time: "21:10 - 21:15", title: "ประกาศข่าว" }
                ]
            },
            {
                id: "day4",
                date: "วันที่ 2 สิงหาคม 2026",
                shortName: "2 ส.ค.",
                items: [
                    { time: "08:30 - 09:10", title: "นมัสการ" },
                    { time: "09:10 - 09:20", title: "เคลื่อนไหวใน HS" },
                    { time: "09:20 - 09:30", title: "ถวายทรัพย์ 5" },
                    { time: "09:30 - 10:40", title: "สอน 5" },
                    { time: "10:40 - 11:50", title: "สอน 6" },
                    { time: "11:50 - 12:00", title: "Share Small Group" },
                    { time: "12:00 - 12:10", title: "ขอบคุณวิทยากร" },
                    { time: "12:10 - 12:30", title: "พิธีปิด" },
                    { time: "12:30 - 12:30", title: "อธ ปิด กลับบ้าน" }
                ]
            }
        ];

        let currentDayId = "day1";

        // ฟังก์ชันวาดปุ่มเลือกวัน
        function renderDayButtons() {
            const container = document.getElementById('daySelector');
            container.innerHTML = '';
            
            scheduleData.forEach(day => {
                const isActive = day.id === currentDayId;
                const btnClass = isActive 
                    ? "pastel-blue text-white shadow-md border-pastel-blue" 
                    : "bg-white text-gray-500 border-gray-200 hover:bg-gray-50";
                
                const buttonHTML = `
                    <button onclick="changeDay('${day.id}')" class="snap-center whitespace-nowrap px-6 py-2 rounded-full font-bold text-sm border transition-all ${btnClass}">
                        ${day.shortName}
                    </button>
                `;
                container.innerHTML += buttonHTML;
            });
        }

        // ฟังก์ชันเปลี่ยนวัน
        function changeDay(dayId) {
            currentDayId = dayId;
            renderDayButtons();
            renderSchedule();
        }

        // ฟังก์ชันวาดกำหนดการลงหน้าเว็บ
        function renderSchedule() {
            const container = document.getElementById('scheduleContainer');
            const day = scheduleData.find(d => d.id === currentDayId);
            
            let itemsHTML = '';
            day.items.forEach(item => {
                itemsHTML += `
                    <div class="flex items-start border-b border-gray-100 last:border-0 py-4 hover:bg-gray-50 transition px-2 rounded-lg">
                        <div class="w-1/3 text-pastel-blue font-bold text-sm mt-0.5">${item.time}</div>
                        <div class="w-2/3 text-gray-800 font-medium pl-2">${item.title}</div>
                    </div>
                `;
            });

            const dayCard = `
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden animate-[fadeIn_0.3s_ease-in-out]">
                    <div class="bg-gray-50 border-b border-gray-100 py-3 px-6 text-center">
                        <span class="font-bold text-gray-700">${day.date}</span>
                    </div>
                    <div class="p-4 md:p-6">
                        ${itemsHTML}
                    </div>
                </div>
            `;
            container.innerHTML = dayCard;
        }

        // เมื่อเปิดหน้าเว็บให้วาดข้อมูลทันที
        window.onload = () => {
            renderDayButtons();
            renderSchedule();
        };
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
