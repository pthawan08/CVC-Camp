                case 'worship': return 'bg-purple-100 border-purple-200 text-purple-800';
                case 'teach': return 'bg-green-100 border-green-200 text-green-800';
                case 'activity': return 'bg-pink-100 border-pink-200 text-pink-800';
                case 'ceremony': return 'bg-yellow-100 border-yellow-200 text-yellow-800';
                case 'media': return 'bg-gray-100 border-gray-200 text-gray-800';
                default: return 'bg-blue-50 border-blue-200 text-blue-800'; // general
            }
        }

                let btn = document.getElementById("btn-" + d);
                if (d === dayKey) {
                    btn.classList.remove("tab-inactive");
                    btn.classList.add("tab-active");
                } else {
                    btn.classList.remove("tab-active");
                    btn.classList.add("tab-inactive");
                }
            });

            const container = document.getElementById("schedule-container");
            container.innerHTML = ""; // ล้างของเก่า

            const items = scheduleData[dayKey];
            
            items.forEach((item, index) => {
                const colorClass = getTypeColor(item.type);

                        <!-- เวลา -->
                        <div class="w-1/4 pr-3 text-right flex flex-col justify-start pt-2">
                            <span class="text-sm font-bold text-gray-800 tracking-tight leading-tight">${item.time.replace(' - ', '<br><span class="text-xs text-gray-400 font-normal">ถึง</span><br>')}</span>
                            <span class="text-[10px] text-gray-400 mt-1">${item.duration}</span>
                        </div>
                        
                        <!-- เส้น Timeline -->
                        <div class="flex flex-col items-center">
                            <div class="w-3 h-3 rounded-full bg-blue-300 border-2 border-white shadow-sm mt-3 z-10"></div>
                            <div class="w-0.5 h-full bg-blue-100 -mt-2"></div>
                        </div>
                        
                        <!-- รายละเอียด -->

                            <div class="${colorClass} border rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow">
                                <h3 class="font-bold text-[15px] leading-tight mb-1">${item.title}</h3>
                                ${item.speaker ? `<p class="text-[13px] font-semibold opacity-90 mb-1 flex items-center">
                                    <svg class="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                    ${item.speaker}
                                </p>` : ''}
                                ${item.team ? `<p class="text-xs opacity-75 flex items-center">
                                    <svg class="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                                    รับผิดชอบ: ${item.team}
                                </p>` : ''}
                                ${item.note ? `<div class="mt-2 pt-2 border-t border-black/5"><p class="text-xs font-medium italic opacity-80">📌 ${item.note}</p></div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // โหลดข้อมูลวันแรกขึ้นมาทันทีเมื่อเปิดเว็บ
        window.onload = () => {
            switchTab('day1');
        };
    </script>
