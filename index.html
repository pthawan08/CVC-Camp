        document.addEventListener("DOMContentLoaded", function() {
            initDropdown();
            window.addEventListener('load', function() {
                if (window.liff) {
                    main();
                } else {
                     document.getElementById("profileName").innerText = "ระบบไม่รองรับ";
                     document.getElementById("profileName").classList.replace("text-blue-600", "text-red-500");
                }
            });
        });
        
        async function main() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    liffUid = profile.userId;
                    document.getElementById("profileName").innerText = "สวัสดีคุณ " + profile.displayName;
                } else {
                    liff.login();
                }
            } catch (err) {
                document.getElementById("profileName").innerText = "ไม่สามารถเชื่อมต่อ LINE ได้";
                document.getElementById("profileName").classList.replace("text-blue-600", "text-red-500");
            }
        }

        function initDropdown() {
            const regionSelect = document.getElementById("region");
            for (const region in churchData) {
                let opt = document.createElement("option");
                opt.value = region; opt.textContent = region;
                regionSelect.appendChild(opt);
            }
        }

        document.getElementById("region").addEventListener("change", function() {
            const region = this.value;
            const churchDiv = document.getElementById("churchDiv");
            const churchSelect = document.getElementById("church");
            const otherChurchDiv = document.getElementById("otherChurchDiv");
            
            churchSelect.innerHTML = '<option value="">-- เลือกคริสตจักร/หน่วย --</option>';
            otherChurchDiv.classList.add("hidden");
            document.getElementById("churchOther").value = "";

            if (region && churchData[region]) {
                churchDiv.classList.remove("hidden");
                churchSelect.required = true;
                churchData[region].forEach(church => {
                    let opt = document.createElement("option");
                    opt.value = church;
                    opt.textContent = church;
                    churchSelect.appendChild(opt);
                });
            } else {
                churchDiv.classList.add("hidden");
                churchSelect.required = false;
            }
        });

        document.getElementById("church").addEventListener("change", function() {
            const otherChurchDiv = document.getElementById("otherChurchDiv");
            const churchOtherInput = document.getElementById("churchOther");
            
            if (this.value === "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)" || this.value === "อื่นๆ") {
                otherChurchDiv.classList.remove("hidden");
                churchOtherInput.required = true;
            } else {
                otherChurchDiv.classList.add("hidden");
                churchOtherInput.required = false;
                churchOtherInput.value = "";
            }
        });

        // 🌟 2. ส่วนคำนวณเงินและปุ่มบวกลบชุดใหม่ที่อัปเดตเข้าไปครับ
        const memberInput = document.getElementById("totalMembers");
        const amountInput = document.getElementById("totalAmount");

        function updateAmount() {
            let count = parseInt(memberInput.value) || 1;
            if (count < 1) { count = 1; memberInput.value = 1; }
            amountInput.value = count * PRICE_PER_PERSON;
        }

        document.getElementById("btnMinus").addEventListener("click", () => {
            let current = parseInt(memberInput.value) || 1;
            if (current > 1) { memberInput.value = current - 1; updateAmount(); }
        });

        document.getElementById("btnPlus").addEventListener("click", () => {
            let current = parseInt(memberInput.value) || 1;
            memberInput.value = current + 1; updateAmount();
        });

        memberInput.addEventListener("input", updateAmount);

       document.getElementById("regForm").addEventListener("submit", async function(e) {
            e.preventDefault(); 
            
            const btn = document.getElementById("btnSubmit");

            // 🌟 จุดที่ 2: สกัดจับตรวจสอบเบอร์โทรศัพท์ 10 หลัก
            const phoneInput = document.getElementById("submitterPhone").value;
            if (!/^[0-9]{10}$/.test(phoneInput)) {
                Swal.fire({
                    icon: 'warning',
                    title: 'เบอร์โทรศัพท์ไม่ถูกต้อง',
                    text: 'กรุณากรอกเบอร์โทรศัพท์ให้ครบ 10 หลัก (ตัวเลขติดกัน ไม่ต้องเว้นวรรค)',
                    confirmButtonColor: '#2563eb'
                });
                return; // สั่งให้หยุดทำงานตรงนี้ ไม่ส่งข้อมูลไป GAS
            }

            // ถ้าเบอร์โทรถูกต้อง ค่อยให้ปุ่มเปลี่ยนเป็นกำลังบันทึก
            btn.disabled = true;
            btn.innerText = "⏳ กำลังบันทึกข้อมูล...";

            const selectedRegion = document.getElementById("region").value;
            const selectedDropdown2 = document.getElementById("church").value;

            const payload = {
                uid: liffUid,
                region: selectedRegion,
                church: (selectedRegion === "คริสตจักรแห่งนิมิตพิษณุโลก") ? "คริสตจักรแห่งนิมิตพิษณุโลก" : selectedDropdown2,
                unit: (selectedRegion === "คริสตจักรแห่งนิมิตพิษณุโลก") ? selectedDropdown2 : "",
                churchOther: document.getElementById("churchOther").value,
                submitterName: document.getElementById("submitterName").value,
                submitterPhone: phoneInput, // ใช้ตัวแปร phoneInput ที่เช็คแล้ว
                totalMembers: document.getElementById("totalMembers").value,
                totalAmount: document.getElementById("totalAmount").value,
                memberNames: document.getElementById("memberNames").value
            };

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (result.result === "success") {
                    Swal.fire({
                        icon: 'success',
                        title: 'ลงทะเบียนสำเร็จ!',
                        text: 'รหัสอ้างอิงของคุณคือ: ' + result.regId,
                        confirmButtonColor: '#2563eb',
                        confirmButtonText: 'รับทราบ (ปิดหน้าต่าง)',
                        allowOutsideClick: false
                    }).then(() => {
                        try { liff.closeWindow(); } catch(e) {}
                    });
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง'
                });
                btn.disabled = false;
                btn.innerText = "บันทึกการลงทะเบียน";
            }
        });
    </script>
</body>
</html>
