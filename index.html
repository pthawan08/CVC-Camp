<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVC Camp</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f9ff; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center items-center min-h-screen">

    <div class="bg-white p-6 md:p-10 rounded-2xl shadow-xl w-full max-w-lg border-t-8 border-blue-600">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">ฟอร์มลงทะเบียนค่าย</h2>
        <p class="text-center text-sm text-blue-600 font-semibold mb-6" id="profileName">กำลังเชื่อมต่อระบบ LINE...</p>

        <form id="regForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">ภาคพันธกิจ / สังกัดหลัก <span class="text-red-500">*</span></label>
                <select id="region" class="mt-1 block w-full p-2.5 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 bg-white" required>
                    <option value="">-- เลือกภาคพันธกิจ/สังกัด --</option>
                </select>
            </div>
            
            <div id="churchDiv" class="hidden">
                <label class="block text-sm font-semibold text-gray-700">คริสตจักร / หน่วย (แขวง) <span class="text-red-500">*</span></label>
                <select id="church" class="mt-1 block w-full p-2.5 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 bg-white"></select>
            </div>

            <div id="otherChurchDiv" class="hidden">
                <label class="block text-sm font-semibold text-gray-700">โปรดระบุชื่อคริสตจักร <span class="text-red-500">*</span></label>
                <input type="text" id="churchOther" class="mt-1 block w-full p-2.5 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 placeholder-gray-400" placeholder="พิมพ์ชื่อคริสตจักรของท่าน">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">ผู้กรอกข้อมูล (ชื่อ-นามสกุล) <span class="text-red-500">*</span></label>
                <input type="text" id="submitterName" class="mt-1 block w-full p-2.5 border border-gray-300 rounded-lg focus:ring-blue-500" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">เบอร์โทรศัพท์ผู้กรอก <span class="text-red-500">*</span></label>
                <input type="tel" id="submitterPhone" class="mt-1 block w-full p-2.5 border border-gray-300 rounded-lg focus:ring-blue-500" placeholder="เช่น 0812345678" maxlength="10" pattern="[0-9]{10}" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">จำนวนผู้สมัคร <span class="text-red-500">*</span></label>
                    <div class="flex items-center mt-1">
                        <button type="button" id="btnMinus" class="bg-gray-200 text-gray-700 hover:bg-gray-300 px-4 py-2.5 rounded-l-lg border border-gray-300 border-r-0 font-bold text-lg transition select-none">-</button>
                        <input type="number" id="totalMembers" value="1" min="1" class="w-full text-center p-2.5 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 font-semibold text-gray-800" required>
                        <button type="button" id="btnPlus" class="bg-gray-200 text-gray-700 hover:bg-gray-300 px-4 py-2.5 rounded-r-lg border border-gray-300 border-l-0 font-bold text-lg transition select-none">+</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">ยอดเงินรวม (บาท) <span class="text-red-500">*</span></label>
                    <input type="number" id="totalAmount" value="350" class="mt-1 block w-full p-2.5 border border-gray-300 rounded-lg bg-gray-100 text-blue-700 font-bold text-center" readonly required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">ระบุชื่อผู้เข้าค่ายเพื่อตรวจสอบง่ายๆ <span class="text-red-500">*</span></label>
                <textarea id="memberNames" rows="3" class="mt-1 block w-full p-2.5 border border-gray-300 rounded-lg focus:ring-blue-500" placeholder="เช่น 1. ส้มหวาน (สถาบัน)&#10;2. น้องเอบี" required></textarea>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-lg hover:bg-blue-700 transition mt-6 disabled:bg-gray-400 shadow-md">
                บันทึกการลงทะเบียน
            </button>
        </form>
    </div>

    <script>
        const MY_LIFF_ID = "2010100436-6Fs5ge58"; 
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzt3qj7QYYuKRG2b_o5jw9p06hSylXVQOCK9ef-UJ7C2B-n_289fS0ErYvI7uhDROJbcQ/exec"; 
        const PRICE_PER_PERSON = 350;
        
        let liffUid = "";
        
         const churchData = {
            "CVCพิษณุโลก": ["BeOne", "BeTwo", "RU", "CL", "NU 1", "NU 2", "NU 3", "NewSeason A", "NewSeason B", "NGP A", "NGP B", "NGP C", "V-Gen A1", "V-Gen A2", "V-Gen B1", "V-Gen B2", "V-Gen B3", "Acts A", "Acts B", "Acts C", "Acts D", "เยรูซาเลม1", "เยรูซาเลม2", "Power Eagle 1", "Power Eagle 2", "Power Eagle 3", "Happiness 1", "Happiness 2", "Unity 1  ", "Unity 2"],
            "ภาคพันธกิจที่ 1 (อ.อำนวย เจริญเรือง)": ["CVCลำพูน", "CVCบ้านโฮ่ง", "CVCบ้านธิ", "CVCเวียงหนองล่อง", "CVCป่าซาง", "CVCทิพเนตร", "CVCแม่ฮ่องสอน", "CVCแม่สะเรียง", "CVCขุนยวม", "CVCสบเมย", "CVCนครเชียงใหม่", "CVCนครลำปาง", "ศูนย์สร้างสรรค์ชีวิตแห่งนิตวังเหนือ", "CVCแม่ทา", "CVCเมืองปาน", "CVCลี้", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 2 (อ.มีชัย ว่องวรวิทย์)": ["CVCเชียงราย", "CVCแม่สรวย", "CVCห้วยนากาด", "CVCเวียงป่าเป้า", "CVCเชียงคำ", "CVCพะเยา", "CVCพะเยา 2", "CVCน่าน", "CVCแม่สาย", "ศูนย์สร้างสรรชีวิตแพร่", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 3 (อ.ยศไกร เกล็ดจีน)": ["CVCบางระกำ", "CVCพรหมพิราม", "CVCบางกระทุ่ม", "CVCวังทอง", "CVCนครไทย", "CVCบ้านแยง", "CVCชาตระการ", "CVCวัดโบสถ์", "CVCชุมชุนชาวแพ", "CVCโตกำแพง", "CVCเขาไร่", "ศูนย์สร้างสรรค์ชีวิตเนินมะปราง", "ศูนย์สร้างสรรค์ชีวิตทรัพย์ไพรวัลย์", "CVCเขาค้อ (ไฮแลนด์)", "CVCอุตรดิตถ์", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 4 (อ.วันชัย คำฟู)": ["CVCนครแม่สอด", "CVCห้วยกะโหลก", "CVCนครสวรรค์", "CVCลาดยาว", "CVCอุทัยธานี", "CVCน้ำรอบ", "CVCลานสัก", "CVCชัยนาท", "CVCสุพรรณบุรี", "CVCพบพระ", "CVCอุ้มผาง", "CVCหนองบัว", "CVCวังน้ำขาว", "CVCบ้านหมี่", "CVCบางพล้อ", "CVCบรรพต", "CVCโกรกพระ", "CVCตาคลี", "CVCตากฟ้า", "CVCชุมตาบง", "CVCแม่วงก์", "CVCแม่เปิน", "CVCอยุธยา", "CVCแม่ละมาด", "CVC อ.เมือง ตาก", "CVCท่าสองยาง", "กลุ่มสร้างสรรค์ชีวิตสว่างอารมภ์", "ศูนย์สร้างสรรค์ชีวิตเมืองอุทัยธานี", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 5 Zone A (อ.ปรเมศวร์ รัตนเวฬุ)": ["CVC กำแพงเพชร", "CVC ขาณุวรลักษณ์", "CVC ไทรพัฒนา", "CVC เพชรบูรณ์", "CVC บ้านน้ำร้อน", "CVC สุโขทัย", "CVC กงไกรลาศ", "CVC พิจิตร", "CVC สามง่าม", "CVC บึงนารา", "CVC คลองขลุง", "CVC สากเหล็ก", "CVC เขาทราย", "CVC เข็กน้อย", "CVC วิเชียรบุรี", "CVC บ้านแม่ท่าแพ", "CVC บ้านห้วยหยวก", "CVC ห้วยมะนาว", "CVC สวรรคโลก", "CVC ไผ่ท่าโพธิ์", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 5 Zone B (อ.บวรทรนง จิรทรัพย์เจริญ)": ["CVCห้วยแย้", "ศูนย์สร้างสรรค์แห่งนิมิตโคราช", "CVCกลางหมื่น", "CVCขอนแก่น", "CVCอุดรธานี", "CVCหนองคาย", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 5 Zone C (อ.อัจจณา ปราณี)": ["CVC กรุงเทพมหานคร", "CVC สมุทปราการ", "CVC กบินทร์บุรี (จ.ปราจีนบุรี)", "CVC ชลบุรี", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 5 Zone D (อ.กาญจนา นาทศิโรรัตน์)": ["CVC เกาะสมุย (จ.สุราษฏร์ธานี)", "CVC มาบอำมฤต (จ.ชุมพร)", "CVC โป๊ะหมอ (หาดใหญ่)", "CVC ปราณบุรี (ประจวบคีรีขันธ์)", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"],
            "ภาคพันธกิจที่ 5 Zone E (อ.พัณณิตา บุญย่านยาว)": ["CVC สเปน (บาเซโลน่า)", "CVC นอร์เวย์ ( ออสโล )", "CVC  เบียล ( สวิตเซอร์แลนด์ )", "CVC บาเซิล ( สวิตเซอร์แลนด์ )", "CVC ธูน ( สวิตเซอร์แลนด์ )", "CVC นครหลวงเวียงจันทร์", "CVC หลัก 32 ( อุดมไซ ลาว )", "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)"]
        };

        document.addEventListener("DOMContentLoaded", function() {
            initDropdown();
            window.addEventListener('load', function() {
                if (window.liff) {
                    main();
                } else {
                     document.getElementById("profileName").innerText = "ระบบไม่รองรับ";
                     document.getElementById("profileName").classList.replace("text-blue-600", "text-red-500");
                }
            });
        });
        
        async function main() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    liffUid = profile.userId;
                    document.getElementById("profileName").innerText = "สวัสดีคุณ " + profile.displayName;
                } else {
                    liff.login();
                }
            } catch (err) {
                document.getElementById("profileName").innerText = "ไม่สามารถเชื่อมต่อ LINE ได้";
                document.getElementById("profileName").classList.replace("text-blue-600", "text-red-500");
            }
        }

        function initDropdown() {
            const regionSelect = document.getElementById("region");
            for (const region in churchData) {
                let opt = document.createElement("option");
                opt.value = region; opt.textContent = region;
                regionSelect.appendChild(opt);
            }
        }

        document.getElementById("region").addEventListener("change", function() {
            const region = this.value;
            const churchDiv = document.getElementById("churchDiv");
            const churchSelect = document.getElementById("church");
            const otherChurchDiv = document.getElementById("otherChurchDiv");
            
            churchSelect.innerHTML = '<option value="">-- เลือกคริสตจักร/หน่วย --</option>';
            otherChurchDiv.classList.add("hidden");
            document.getElementById("churchOther").value = "";

            if (region && churchData[region]) {
                churchDiv.classList.remove("hidden");
                churchSelect.required = true;
                churchData[region].forEach(church => {
                    let opt = document.createElement("option");
                    opt.value = church;
                    opt.textContent = church;
                    churchSelect.appendChild(opt);
                });
            } else {
                churchDiv.classList.add("hidden");
                churchSelect.required = false;
            }
        });

        document.getElementById("church").addEventListener("change", function() {
            const otherChurchDiv = document.getElementById("otherChurchDiv");
            const churchOtherInput = document.getElementById("churchOther");
            
            if (this.value === "อื่นๆ (กรุณากรอกชื่อคริสตจักรในช่องถัดไป)" || this.value === "อื่นๆ") {
                otherChurchDiv.classList.remove("hidden");
                churchOtherInput.required = true;
            } else {
                otherChurchDiv.classList.add("hidden");
                churchOtherInput.required = false;
                churchOtherInput.value = "";
            }
        });

        // 🌟 2. ส่วนคำนวณเงินและปุ่มบวกลบชุดใหม่ที่อัปเดตเข้าไปครับ
        const memberInput = document.getElementById("totalMembers");
        const amountInput = document.getElementById("totalAmount");

        function updateAmount() {
            let count = parseInt(memberInput.value) || 1;
            if (count < 1) { count = 1; memberInput.value = 1; }
            amountInput.value = count * PRICE_PER_PERSON;
        }

        document.getElementById("btnMinus").addEventListener("click", () => {
            let current = parseInt(memberInput.value) || 1;
            if (current > 1) { memberInput.value = current - 1; updateAmount(); }
        });

        document.getElementById("btnPlus").addEventListener("click", () => {
            let current = parseInt(memberInput.value) || 1;
            memberInput.value = current + 1; updateAmount();
        });

        memberInput.addEventListener("input", updateAmount);

       document.getElementById("regForm").addEventListener("submit", async function(e) {
            e.preventDefault(); 
            
            const btn = document.getElementById("btnSubmit");

            // 🌟 จุดที่ 2: สกัดจับตรวจสอบเบอร์โทรศัพท์ 10 หลัก
            const phoneInput = document.getElementById("submitterPhone").value;
            if (!/^[0-9]{10}$/.test(phoneInput)) {
                Swal.fire({
                    icon: 'warning',
                    title: 'เบอร์โทรศัพท์ไม่ถูกต้อง',
                    text: 'กรุณากรอกเบอร์โทรศัพท์ให้ครบ 10 หลัก (ตัวเลขติดกัน ไม่ต้องเว้นวรรค)',
                    confirmButtonColor: '#2563eb'
                });
                return; // สั่งให้หยุดทำงานตรงนี้ ไม่ส่งข้อมูลไป GAS
            }

            // ถ้าเบอร์โทรถูกต้อง ค่อยให้ปุ่มเปลี่ยนเป็นกำลังบันทึก
            btn.disabled = true;
            btn.innerText = "⏳ กำลังบันทึกข้อมูล...";

            const selectedRegion = document.getElementById("region").value;
            const selectedDropdown2 = document.getElementById("church").value;

            const payload = {
                uid: liffUid,
                region: selectedRegion,
                church: (selectedRegion === "คริสตจักรแห่งนิมิตพิษณุโลก") ? "คริสตจักรแห่งนิมิตพิษณุโลก" : selectedDropdown2,
                unit: (selectedRegion === "คริสตจักรแห่งนิมิตพิษณุโลก") ? selectedDropdown2 : "",
                churchOther: document.getElementById("churchOther").value,
                submitterName: document.getElementById("submitterName").value,
                submitterPhone: phoneInput, // ใช้ตัวแปร phoneInput ที่เช็คแล้ว
                totalMembers: document.getElementById("totalMembers").value,
                totalAmount: document.getElementById("totalAmount").value,
                memberNames: document.getElementById("memberNames").value
            };

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (result.result === "success") {
                    Swal.fire({
                        icon: 'success',
                        title: 'ลงทะเบียนสำเร็จ!',
                        text: 'รหัสอ้างอิงของคุณคือ: ' + result.regId,
                        confirmButtonColor: '#2563eb',
                        confirmButtonText: 'รับทราบ (ปิดหน้าต่าง)',
                        allowOutsideClick: false
                    }).then(() => {
                        try { liff.closeWindow(); } catch(e) {}
                    });
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง'
                });
                btn.disabled = false;
                btn.innerText = "บันทึกการลงทะเบียน";
            }
        });
    </script>
</body>
</html>
